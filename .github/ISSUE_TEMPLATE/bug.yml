name: Bug
description: Report a bug.
title: "[BUG] "
labels:
  - bug

body:
  - type: textarea
    id: bug
    attributes:
      label: Bug Description
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots